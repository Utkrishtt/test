<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Summary</title>
    <link rel="stylesheet" href="result.css">
</head>
<body>
    <div class="box">
        <div class="wrapper">
        <div class="result">
            <div class="">Your Result</div>
            <div class="circle"> <div class="one">76</div> of 100 </div>
            <div>Great</div>
            <div>You Scored higher than 65% of the people who have taken these tests</div>
        </div>
        <div class="summary">
            <p class="s">Summary</p> 
            <div class="tags">
            <div class="r tag">reaction</div>
            <div class="m tag">memory</div>
            <div class="v tag">verbal</div>
            <div class="vis tag">visual</div>
            <button>continue</button>
            </div>
        </div>
        </div>
    </div>
</body>
</html>
